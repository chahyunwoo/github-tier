<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="450" height="260" viewBox="0 0 450 260" fill="none">
  <defs>
    <linearGradient id="tierGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8961E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F0B232" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="emblemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8961E"/>
      <stop offset="100%" stop-color="#F0B232"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C8961E"/>
      <stop offset="100%" stop-color="#F0B232"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="avatarClip"><circle cx="24" cy="24" r="22"/></clipPath>
    <pattern id="bgPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#F0B232" fill-opacity="0.03"/>
    </pattern>
  </defs>

  <style>
    * { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; }
  </style>

  <!-- Background -->
  <rect width="450" height="260" rx="4.5" fill="#0D1117"/>
  <rect width="450" height="260" rx="4.5" fill="url(#tierGlow)"/>
  <rect width="450" height="260" rx="4.5" fill="url(#bgPattern)"/>
  <rect width="450" height="260" rx="4.5" fill="none" stroke="#30363D" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Top tier accent line -->
  <rect x="0" y="0" width="450" height="2" rx="4.5" fill="#F0B232" fill-opacity="0.6"/>

  

  <!-- Avatar -->
  <g transform="translate(18, 18)">
    <image href="" x="2" y="2" width="44" height="44" clip-path="url(#avatarClip)" preserveAspectRatio="xMidYMid slice"/>
    <circle cx="24" cy="24" r="22" fill="none" stroke="#F0B232" stroke-width="2" stroke-opacity="0.6"/>
  </g>

  <!-- User Info -->
  <g>
    <text x="80" y="36" font-size="15" font-weight="700" fill="#E6EDF3">GitHub User</text>
    <text x="80" y="52" font-size="11" fill="#8B949E">@username</text>
    <text x="80" y="68" font-size="10" font-weight="600" fill="#F0B232">Top 46%</text>
    <text x="138" y="68" font-size="9" fill="#8B949E" fill-opacity="0.6">+2 to Gold II</text>
  </g>

  <!-- Tier Emblem -->
  <g transform="translate(368, 14)">
    
    <defs>
      <linearGradient id="hexGrad_Gold" x1="0.2" y1="0" x2="0.8" y2="1">
        <stop offset="0%" stop-color="#C8961E"/>
        <stop offset="100%" stop-color="#F0B232"/>
      </linearGradient>
    </defs>

    <!-- Outer glow ring -->
    <polygon points="32,-2 66,17 66,55 32,74 -2,55 -2,17"
      fill="none" stroke="#F0B232" stroke-width="0.5" stroke-opacity="0.15"/>

    <!-- Outer hex -->
    <polygon points="32,0 64,18 64,54 32,72 0,54 0,18"
      fill="url(#hexGrad_Gold)" fill-opacity="0.12"
      stroke="url(#hexGrad_Gold)" stroke-width="1.5"/>

    <!-- Inner hex -->
    <polygon points="32,6 58,20 58,52 32,66 6,52 6,20"
      fill="url(#hexGrad_Gold)" fill-opacity="0.06"
      stroke="url(#hexGrad_Gold)" stroke-width="0.5" stroke-opacity="0.3"/>

    
    
      <path d="M30,36 L32,34 L34,36 L32,38 Z" fill="#F0B232" fill-opacity="0.12"/>
    

    <!-- Tier name -->
    <text x="32" y="29" text-anchor="middle" dominant-baseline="central"
      font-size="9" font-weight="800" letter-spacing="0.5" font-family="Segoe UI, Ubuntu, sans-serif"
      fill="#F0B232">GOLD</text>

    <!-- Division -->
    <text x="32" y="45" text-anchor="middle" dominant-baseline="central"
      font-size="13" font-weight="800" font-family="Segoe UI, Ubuntu, sans-serif"
      fill="#F0B232">III</text>
    
  </g>

  <!-- Tier Stars -->
  <g transform="translate(368, 92)">
    <path d="M23,0 L23.8,2 L26,2.2 L24.2,3.6 L24.8,6 L23,4.6 L21.2,6 L21.8,3.6 L20,2.2 L22.2,2 Z"
    fill="#F0B232" fill-opacity="0.5"/><path d="M32,0 L32.8,2 L35,2.2 L33.2,3.6 L33.8,6 L32,4.6 L30.2,6 L30.8,3.6 L29,2.2 L31.2,2 Z"
    fill="#F0B232" fill-opacity="0.5"/><path d="M41,0 L41.8,2 L44,2.2 L42.2,3.6 L42.8,6 L41,4.6 L39.2,6 L39.8,3.6 L38,2.2 L40.2,2 Z"
    fill="#F0B232" fill-opacity="0.5"/>
  </g>

  <!-- Stat Bars -->
  <g transform="translate(18, 108)">
    
      <g transform="translate(0, 0)">
        <svg x="0" y="1" width="14" height="14" viewBox="0 0 16 16" fill="#58A6FF">
          <path d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.75a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
        </svg>
        <text x="20" y="8" dominant-baseline="central" font-size="11" fill="#C9D1D9">Commits</text>
        <rect x="88" y="4" width="246" height="8" rx="4" fill="#21262D"/>
        <rect x="88" y="4" width="98" height="8" rx="4" fill="url(#barGrad)" opacity="0.85"/>
        <text x="340" y="8" dominant-baseline="central" font-size="10" fill="#8B949E">2.0k</text>
        <text x="414" y="8" dominant-baseline="central" text-anchor="end" font-size="9" font-weight="700" fill="#58A6FF">40 <tspan fill="#8B949E" font-weight="400" font-size="7">/ 100</tspan></text>
      </g>
    
      <g transform="translate(0, 26)">
        <svg x="0" y="1" width="14" height="14" viewBox="0 0 16 16" fill="#58A6FF">
          <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
        </svg>
        <text x="20" y="8" dominant-baseline="central" font-size="11" fill="#C9D1D9">Stars</text>
        <rect x="88" y="4" width="246" height="8" rx="4" fill="#21262D"/>
        <rect x="88" y="4" width="89" height="8" rx="4" fill="url(#barGrad)" opacity="0.85"/>
        <text x="340" y="8" dominant-baseline="central" font-size="10" fill="#8B949E">1.2k</text>
        <text x="414" y="8" dominant-baseline="central" text-anchor="end" font-size="9" font-weight="700" fill="#58A6FF">36 <tspan fill="#8B949E" font-weight="400" font-size="7">/ 100</tspan></text>
      </g>
    
      <g transform="translate(0, 52)">
        <svg x="0" y="1" width="14" height="14" viewBox="0 0 16 16" fill="#58A6FF">
          <path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354Z"/>
        </svg>
        <text x="20" y="8" dominant-baseline="central" font-size="11" fill="#C9D1D9">PRs</text>
        <rect x="88" y="4" width="246" height="8" rx="4" fill="#21262D"/>
        <rect x="88" y="4" width="84" height="8" rx="4" fill="url(#barGrad)" opacity="0.85"/>
        <text x="340" y="8" dominant-baseline="central" font-size="10" fill="#8B949E">320</text>
        <text x="414" y="8" dominant-baseline="central" text-anchor="end" font-size="9" font-weight="700" fill="#58A6FF">34 <tspan fill="#8B949E" font-weight="400" font-size="7">/ 100</tspan></text>
      </g>
    
      <g transform="translate(0, 78)">
        <svg x="0" y="1" width="14" height="14" viewBox="0 0 16 16" fill="#58A6FF">
          <path d="M10.561 8.073a6 6 0 0 1 3.32 5.17.75.75 0 1 1-1.497.076 4.5 4.5 0 0 0-7.37-3.11.75.75 0 0 1-.994-1.124A6 6 0 0 1 8 7.5a6 6 0 0 1 2.561.573ZM8 5.5a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm0 1.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Z"/>
        </svg>
        <text x="20" y="8" dominant-baseline="central" font-size="11" fill="#C9D1D9">Followers</text>
        <rect x="88" y="4" width="246" height="8" rx="4" fill="#21262D"/>
        <rect x="88" y="4" width="79" height="8" rx="4" fill="url(#barGrad)" opacity="0.85"/>
        <text x="340" y="8" dominant-baseline="central" font-size="10" fill="#8B949E">600</text>
        <text x="414" y="8" dominant-baseline="central" text-anchor="end" font-size="9" font-weight="700" fill="#58A6FF">32 <tspan fill="#8B949E" font-weight="400" font-size="7">/ 100</tspan></text>
      </g>
    
      <g transform="translate(0, 104)">
        <svg x="0" y="1" width="14" height="14" viewBox="0 0 16 16" fill="#58A6FF">
          <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Z"/>
        </svg>
        <text x="20" y="8" dominant-baseline="central" font-size="11" fill="#C9D1D9">Issues</text>
        <rect x="88" y="4" width="246" height="8" rx="4" fill="#21262D"/>
        <rect x="88" y="4" width="69" height="8" rx="4" fill="url(#barGrad)" opacity="0.85"/>
        <text x="340" y="8" dominant-baseline="central" font-size="10" fill="#8B949E">160</text>
        <text x="414" y="8" dominant-baseline="central" text-anchor="end" font-size="9" font-weight="700" fill="#58A6FF">28 <tspan fill="#8B949E" font-weight="400" font-size="7">/ 100</tspan></text>
      </g>
    
  </g>

  <!-- Watermark -->
  <text x="432" y="252" text-anchor="end" font-size="8" fill="#8B949E" fill-opacity="0.4">github-tier.vercel.app</text>
</svg>