<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#1F6FEB"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#F0B232"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#30363D" stroke-width="2"/>

  <!-- Hex glow - centered at 100,100, radius ~65 -->
  <polygon points="100,35 156,67 156,133 100,165 44,133 44,67"
    fill="none" stroke="#58A6FF" stroke-width="1" stroke-opacity="0.2" filter="url(#glow)"/>

  <!-- Hex main -->
  <polygon points="100,40 150,70 150,130 100,160 50,130 50,70"
    fill="url(#hexGrad)" fill-opacity="0.15"
    stroke="url(#hexGrad)" stroke-width="2.5"/>

  <!-- Hex inner -->
  <polygon points="100,50 140,75 140,125 100,150 60,125 60,75"
    fill="url(#hexGrad)" fill-opacity="0.07"/>

  <!-- Up arrow centered at 100,88 -->
  <path d="M100,58 L118,80 L110,80 L110,108 L90,108 L90,80 L82,80 Z"
    fill="url(#arrowGrad)" filter="url(#glow)"/>

  <!-- TIER text inside hex -->
  <text x="100" y="135" text-anchor="middle" dominant-baseline="central"
    font-size="11" font-weight="900" letter-spacing="3"
    fill="#58A6FF" font-family="Segoe UI, Ubuntu, sans-serif">TIER</text>
</svg>
